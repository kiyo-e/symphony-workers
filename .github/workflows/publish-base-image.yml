name: Publish base image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish, for example 0.2.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/symphony-workers-base

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            raw_version="${{ github.event.release.tag_name }}"
          else
            raw_version="${{ inputs.image_tag }}"
          fi
          version="${raw_version#v}"
          template_image_tag="$(sed -n 's#^FROM ghcr.io/kiyo-e/symphony-workers-base:\(.*\)$#\1#p' templates/cloudflare-worker/Dockerfile)"

          if [[ -z "$template_image_tag" ]]; then
            echo "Could not read the template base image tag" >&2
            exit 1
          fi
          if [[ "$template_image_tag" != "$version" ]]; then
            echo "Template image tag is $template_image_tag, not $version. Skipping image publish."
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "should_publish=true" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: steps.release.outputs.should_publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        if: steps.release.outputs.should_publish == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.release.outputs.version }}

      - name: Build and push image
        if: steps.release.outputs.should_publish == 'true'
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        if: steps.release.outputs.should_publish == 'true'
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
